<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <main class="container">
        <section class="container-justify-content-login">
            <div class="container-login-panel">
                <div class="login-panel">
                    <form action="" class="login-form">
                        <div class="login-item">
                            <h2>ورود به سیستم</h2>
                            <span>لطفا اطلاعات حساب کاربری خود را وارد نمایید.</span>
                        </div>
                        <div class="login-item">
                            <label for="email">ایمیل مدیریت</label>
                            <div class="input-element-justify">
                                <div class="icone"><i class="bi bi-envelope-at-fill"></i></div>
                                <input type="text" placeholder="example@gmailcom" class="email-input-login"
                                    name="email-input-login" id="email-input-login">
                            </div>
                        </div>
                        <div class="login-item">
                            <label for="Pass">رمز عبور</label>
                            <div class="input-element-justify">
                                <div class="icone"><i class="bi bi-key-fill"></i></div>
                                <input type="password" placeholder="رمز عبور" class="pass-input-login"
                                    name="pass-input-login" id="pass-input-login">
                            </div>

                        </div>
                        <div class="login-btn login-btn">
                            <!-- <input type="submit" value="" class="submit-btn"> -->
                            <button type="submit" class="submit-btn">
                                <h4>ورود به حساب</h4>
                                <div><i class="bi bi-box-arrow-in-right"></i></div>
                            </button>

                        </div>
                        <div class="line"></div>
                    </form>
                    <div class="demo-login">
                        <a href="./panel.html" class="demo-navigate"><button>
                                <h4> حالت دمو</h4>
                                <div><i class="bi bi-box-arrow-in-left"></i></div>
                            </button></a>
                    </div>
                </div>
            </div>
            <div class="info-bg-next-to-login-form">
                <div class="info-text-elements">
                    <div class="info-row-text">
                        <div><i class="bi bi-check-circle-fill"></i></div>
                        <div class="text-info">
                            <h2> پنل مدیریتی شیراز پیسی</h2>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="./js/script.js"></script>
</body>

</html>
